version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Required in .env:
#   POSTGRES_PASSWORD  – password for the internal Postgres container
#   REDIS_PASSWORD     – password for the internal Redis container
#   + all vars from .env.example
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Runs `prisma migrate deploy` once, then exits.
  # Uses the builder image stage (has prisma CLI as devDep).
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/crypto_gateway
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/crypto_gateway
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      start_period: 20s
      timeout: 5s
      retries: 5
    volumes:
      - ./logs:/app/logs

  worker:
    build: .
    command: node dist/worker.js
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/crypto_gateway
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d crypto_gateway']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep -c PONG']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
