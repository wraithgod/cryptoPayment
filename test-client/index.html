<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPG — Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 480px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }

    input, select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
      appearance: none;
    }
    input:focus, select:focus { border-color: #7c3aed; }
    input::placeholder { color: #475569; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row > div { display: flex; flex-direction: column; }
    .row input, .row select { margin-bottom: 0; }

    button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    button:hover { opacity: .9; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    /* Result card */
    .result { display: none; }
    .result.show { display: block; }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .PENDING   { background: #1e293b; color: #94a3b8; }
    .DETECTED  { background: #1a2e1a; color: #4ade80; animation: pulse 1.5s infinite; }
    .CONFIRMED { background: #1a2a1a; color: #22c55e; }
    .SWEEPING  { background: #1e1a2e; color: #a78bfa; animation: pulse 1.5s infinite; }
    .COMPLETED { background: #0f2a1a; color: #4ade80; }
    .EXPIRED   { background: #2a1a1a; color: #f87171; }
    .FAILED    { background: #2a1a1a; color: #ef4444; }
    .UNDERPAID { background: #2a201a; color: #fb923c; }
    .OVERPAID  { background: #1a1a2a; color: #60a5fa; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

    .address-box {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: #a78bfa;
      cursor: pointer;
      position: relative;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .address-box:hover { border-color: #7c3aed; }
    .copy-hint { font-size: 11px; color: #475569; margin-top: 6px; }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .meta-item { background: #0f1117; border-radius: 10px; padding: 12px; }
    .meta-item .key { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .meta-item .val { font-size: 15px; font-weight: 600; }

    .timer { text-align: center; font-size: 13px; color: #64748b; }
    .timer span { color: #f87171; font-weight: 600; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #4ade80; color: #0f1117; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .error-msg { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>CryptoPayment Gateway</h1>
  <p class="subtitle">Test client — создай платёж и отслеживай статус</p>

  <!-- Form -->
  <div class="card">
    <label>API Key</label>
    <input id="apiKey" type="text" placeholder="cpg_xxxxxxxx" />

    <div class="row">
      <div>
        <label>Сеть</label>
        <select id="network" onchange="updateTokens()">
          <option value="ETH">Ethereum</option>
          <option value="BSC">BNB Chain</option>
          <option value="TRON">TRON</option>
          <option value="SOLANA">Solana</option>
        </select>
      </div>
      <div>
        <label>Токен</label>
        <select id="token">
          <option value="ETH">ETH</option>
          <option value="USDT">USDT</option>
          <option value="USDC">USDC</option>
        </select>
      </div>
    </div>

    <label>Сумма</label>
    <input id="amount" type="number" step="0.01" placeholder="10.00" />

    <button id="createBtn" onclick="createPayment()">Создать платёж</button>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <!-- Result -->
  <div class="card result" id="result">
    <div id="statusBadge" class="status-badge PENDING">PENDING</div>

    <div class="meta-grid">
      <div class="meta-item">
        <div class="key">Сеть</div>
        <div class="val" id="resNetwork">—</div>
      </div>
      <div class="meta-item">
        <div class="key">Токен</div>
        <div class="val" id="resToken">—</div>
      </div>
      <div class="meta-item">
        <div class="key">Сумма</div>
        <div class="val" id="resAmount">—</div>
      </div>
      <div class="meta-item">
        <div class="key">Подтверждений</div>
        <div class="val" id="resConfs">—</div>
      </div>
    </div>

    <label>Адрес для оплаты (нажми чтобы скопировать)</label>
    <div class="address-box" id="resAddress" onclick="copyAddress()">
      —
      <div class="copy-hint">Нажми для копирования</div>
    </div>

    <div class="timer">Истекает через <span id="timerDisplay">—</span></div>
  </div>
</div>

<div class="toast" id="toast">Скопировано!</div>

<script>
  const TOKENS = {
    ETH:    ['ETH', 'USDT', 'USDC'],
    BSC:    ['BNB', 'USDT', 'USDC'],
    TRON:   ['TRX', 'USDT', 'USDC'],
    SOLANA: ['SOL', 'USDT', 'USDC'],
  };

  function updateTokens() {
    const net = document.getElementById('network').value;
    const sel = document.getElementById('token');
    sel.innerHTML = TOKENS[net].map(t => `<option value="${t}">${t}</option>`).join('');
  }

  let currentPaymentId = null;
  let pollInterval = null;
  let timerInterval = null;
  let expiresAt = null;

  async function createPayment() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const network = document.getElementById('network').value;
    const token = document.getElementById('token').value;
    const amount = document.getElementById('amount').value.trim();
    const errEl = document.getElementById('errorMsg');

    errEl.classList.remove('show');

    if (!apiKey) return showError('Введи API Key');
    if (!amount || parseFloat(amount) <= 0) return showError('Введи корректную сумму');

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.textContent = 'Создаём...';

    try {
      const res = await fetch('/api/v1/payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Api-Key': apiKey },
        body: JSON.stringify({ network, token, amount }),
      });

      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Ошибка создания');

      const p = json.data;
      currentPaymentId = p.id;
      expiresAt = new Date(p.expiresAt);

      renderPayment(p);
      document.getElementById('result').classList.add('show');

      startPolling(apiKey);
      startTimer();
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Создать платёж';
    }
  }

  function renderPayment(p) {
    const badge = document.getElementById('statusBadge');
    badge.textContent = p.status;
    badge.className = 'status-badge ' + p.status;

    document.getElementById('resNetwork').textContent = p.network;
    document.getElementById('resToken').textContent = p.token;
    document.getElementById('resAmount').textContent = p.expectedAmount + ' ' + p.token;
    document.getElementById('resConfs').textContent = p.confirmations ?? '0';
    document.getElementById('resAddress').childNodes[0].textContent = p.wallet?.address ?? p.address ?? '—';
  }

  function startPolling(apiKey) {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
      try {
        const res = await fetch(`/api/v1/payments/${currentPaymentId}`, {
          headers: { 'X-Api-Key': apiKey },
        });
        const json = await res.json();
        if (res.ok) {
          renderPayment(json.data);
          const done = ['COMPLETED', 'EXPIRED', 'FAILED'].includes(json.data.status);
          if (done) {
            clearInterval(pollInterval);
            clearInterval(timerInterval);
          }
        }
      } catch {}
    }, 5000);
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const diff = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
      const m = String(Math.floor(diff / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      document.getElementById('timerDisplay').textContent = `${m}:${s}`;
      if (diff === 0) clearInterval(timerInterval);
    }, 1000);
  }

  function copyAddress() {
    const addr = document.getElementById('resAddress').childNodes[0].textContent.trim();
    if (addr === '—') return;
    navigator.clipboard.writeText(addr);
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
