# nginx.conf — HTTPS with Let's Encrypt (certbot)
# 1. Install: sudo apt install nginx certbot python3-certbot-nginx
# 2. Replace YOUR_DOMAIN below
# 3. Copy this file to /etc/nginx/sites-available/cpg
# 4. sudo ln -s /etc/nginx/sites-available/cpg /etc/nginx/sites-enabled/
# 5. Add the limit_req_zone lines to /etc/nginx/nginx.conf inside the http{} block
# 6. sudo nginx -t && sudo systemctl reload nginx
# 7. sudo certbot --nginx -d YOUR_DOMAIN   (auto-patches SSL blocks)

# ── Put these two lines in /etc/nginx/nginx.conf inside the http{} block ──
# limit_req_zone $binary_remote_addr zone=payment_api:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=withdrawal_api:10m rate=5r/m;

upstream cpg_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;

    # Strip spoofable IP headers from client before passing to app
    # The app reads request.ip via Fastify trustProxy which then uses X-Forwarded-For set here
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # Request limits
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Rate-limit payment creation
    location = /api/v1/payments {
        limit_req zone=payment_api burst=10 nodelay;
        proxy_pass         http://cpg_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Tighter rate-limit on withdrawals — financial endpoint
    location = /api/v1/withdrawals {
        limit_req zone=withdrawal_api burst=3 nodelay;
        proxy_pass         http://cpg_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        proxy_pass         http://cpg_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
